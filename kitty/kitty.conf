include colors.conf

cursor_trail 3

font_family PixelCode
bold_font PixelCode
italic_font PixelCode
bold_italic_font PixelCode
font_size 12

background_opacity 0.9
cursor_shape beam

disable_ligatures always

scrollbar_width 1
scrollbar_hover_width 1.5
scrollbar_handle_color #da37ff
scrollbar_track_color #d800d8

enable_audio_bell no
visual_bell_duration 0.0
confirm_os_window_close 0
allow_remote_control yes